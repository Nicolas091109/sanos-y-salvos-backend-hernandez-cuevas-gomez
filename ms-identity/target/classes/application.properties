server.port=8081
spring.datasource.url=${IDENTITY_DB_URL:jdbc:postgresql://localhost:5432/sanos_y_salvos_identity}
spring.datasource.username=${IDENTITY_DB_USERNAME:postgres}
spring.datasource.password=${IDENTITY_DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.threads.virtual.enabled=true
